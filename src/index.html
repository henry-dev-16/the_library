<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria ITLA - Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Libreria ITLA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="autores.html">Autores</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="page-header">
            <h2>Listado de Libros Disponibles</h2>
        </div>

        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body text-center p-3">
                        <div class="stat-label">Total (count)</div>
                        <div class="stat-number" id="totalCount">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body text-center p-3">
                        <div class="stat-label">Total (sizeof)</div>
                        <div class="stat-number" id="totalSizeof">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Titulo</th>
                            <th>Genero</th>
                            <th>Precio</th>
                            <th>Fecha de Publicacion</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLibros">
                        <tr>
                            <td colspan="5">
                                <div class="loading">
                                    <div class="loading-spinner"></div>
                                    Cargando libros...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="text-white">
        <div class="container text-center">
            <p class="mb-1">Libreria ITLA &copy; 2026 - Proyecto Final Programacion Web</p>
            <small>PHP | PDO | MySQL | Bootstrap | Docker</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
